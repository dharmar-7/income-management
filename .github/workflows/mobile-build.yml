name: Mobile Build (Android APK)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-build.yml'

jobs:
  build:
    name: Build & Release Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm install

      - name: Build APK via EAS
        id: build
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_JSON=$(npx eas-cli build --platform android --profile preview --non-interactive --wait --json)
          echo "$BUILD_JSON"
          BUILD_URL=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.buildUrl // empty')
          if [ -z "$BUILD_URL" ]; then
            echo "ERROR: No build URL returned. EAS build may have failed."
            exit 1
          fi
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT

      - name: Download APK
        run: |
          curl -L "${{ steps.build.outputs.build_url }}" -o velora.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-${{ github.run_number }}
          name: "Velora Android v${{ github.run_number }}"
          body: |
            ## Velora for Android

            **Install instructions:**
            1. Download `velora.apk` below
            2. On your Android phone: Settings → Apps → Special app access → Install unknown apps → allow your browser
            3. Open the downloaded file and tap Install

            > Built automatically from commit ${{ github.sha }}
          files: velora.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
